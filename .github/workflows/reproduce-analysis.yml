name: reproduce-analysis

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install analytical dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scipy matplotlib
      - name: Verify public package
        run: python scripts/verify_public_package.py
      - name: Run unit checks
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Reproduce Phase 06 analysis
        run: |
          python src/analysis/phase06_dataset_audit.py
          python src/analysis/phase06_descriptive_statistics.py
          python src/analysis/phase06_hypothesis_tests.py
          python src/analysis/phase06_scenario_analysis.py
          python src/analysis/phase06_incident_analysis.py
